    <script>
        // ===== TOAST NOTIFICATION SYSTEM =====
        const Toast = {
            show(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
                toast.innerHTML = `
                    <span style="font-size: 20px;">${icon}</span>
                    <span>${message}</span>
                `;
                
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // ===== ENHANCED MARKDOWN PARSER =====
        const MarkdownParser = (() => {
            function escape(html) {
                return html
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function generateId(text) {
                return text.toLowerCase()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/--+/g, '-')
                    .replace(/^-+|-+$/g, '');
            }

            function parseInline(src) {
                let out = '';
                let cap;

                while (src) {
                    // Escape
                    if (cap = /^\\([\\`*_{}[\]()#+\-.!])/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += escape(cap[1]);
                        continue;
                    }

                    // Code
                    if (cap = /^(`+)([^`]|[^`][\s\S]*?[^`])\1(?!`)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<code>' + escape(cap[2].trim()) + '</code>';
                        continue;
                    }

                    // Strong
                    if (cap = /^\*\*(?=\S)([\s\S]*?\S)\*\*(?!\*)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<strong>' + parseInline(cap[1]) + '</strong>';
                        continue;
                    }
                    
                    if (cap = /^__(?=\S)([\s\S]*?\S)__(?!_)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<strong>' + parseInline(cap[1]) + '</strong>';
                        continue;
                    }

                    // Em
                    if (cap = /^\*(?=\S)([\s\S]*?\S)\*(?!\*)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<em>' + parseInline(cap[1]) + '</em>';
                        continue;
                    }
                    
                    if (cap = /^_(?=\S)([\s\S]*?\S)_(?!_)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<em>' + parseInline(cap[1]) + '</em>';
                        continue;
                    }

                    // Link
                    if (cap = /^!?\[([^\]]*)\]\(([^)]+)\)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        const isImage = cap[0][0] === '!';
                        const text = cap[1];
                        const href = cap[2];
                        
                        if (isImage) {
                            out += '<img src="' + escape(href) + '" alt="' + escape(text) + '">';
                        } else {
                            out += '<a href="' + escape(href) + '" target="_blank">' + parseInline(text) + '</a>';
                        }
                        continue;
                    }

                    // Strikethrough
                    if (cap = /^~~(?=\S)([\s\S]*?\S)~~/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += '<del>' + parseInline(cap[1]) + '</del>';
                        continue;
                    }

                    // Text
                    if (cap = /^[\s\S]+?(?=[\\<!\[`*_~]|$)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        out += escape(cap[0]);
                        continue;
                    }

                    if (src) {
                        out += escape(src[0]);
                        src = src.substring(1);
                    }
                }

                return out;
            }

            let codeBlockId = 0;

            function parse(src) {
                src = src.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\t/g, '    ');
                const tokens = [];
                let cap;

                while (src) {
                    // Newline
                    if (cap = /^\n+/.exec(src)) {
                        src = src.substring(cap[0].length);
                        continue;
                    }

                    // Code block with language
                    if (cap = /^```(\w+)?\n([\s\S]*?)\n```/.exec(src)) {
                        src = src.substring(cap[0].length);
                        const lang = cap[1] || 'text';
                        const isCommand = ['bash', 'sh', 'shell', 'cmd', 'terminal'].includes(lang.toLowerCase());
                        
                        tokens.push({
                            type: isCommand ? 'command' : 'code',
                            lang: lang,
                            text: cap[2],
                            id: `code-${codeBlockId++}`
                        });
                        continue;
                    }

                    // Heading
                    if (cap = /^(#{1,6}) +([^\n]+)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        const depth = cap[1].length;
                        const text = cap[2];
                        const id = generateId(text);
                        tokens.push({
                            type: 'heading',
                            depth: depth,
                            text: text,
                            id: id
                        });
                        continue;
                    }

                    // Blockquote
                    if (cap = /^((?:> ?[^\n]+(?:\n|$))+)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        tokens.push({
                            type: 'blockquote',
                            text: cap[1].replace(/^ *> ?/gm, '')
                        });
                        continue;
                    }

                    // Task list
                    if (cap = /^- \[([ x])\] +(.+)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        tokens.push({
                            type: 'task',
                            checked: cap[1] === 'x',
                            text: cap[2]
                        });
                        continue;
                    }

                    // List
                    if (cap = /^( *)([*+-]|\d+\.) +([\s\S]+?)(?:\n{2,}|$)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        const ordered = cap[2].length > 1;
                        const items = cap[3].split(/\n(?:[*+-]|\d+\.) +/);
                        tokens.push({
                            type: 'list',
                            ordered: ordered,
                            items: items
                        });
                        continue;
                    }

                    // HR
                    if (cap = /^([-*_]){3,}/.exec(src)) {
                        src = src.substring(cap[0].length);
                        tokens.push({ type: 'hr' });
                        continue;
                    }

                    // Table
                    if (cap = /^\|(.+)\n\|?([-: ]+[-| :]*)\n((?:\|.*(?:\n|$))*)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        const headers = cap[1].split('|').map(h => h.trim()).filter(h => h);
                        const rows = cap[3].trim().split('\n').map(row => 
                            row.split('|').map(cell => cell.trim()).filter(cell => cell)
                        );
                        tokens.push({
                            type: 'table',
                            headers: headers,
                            rows: rows
                        });
                        continue;
                    }

                    // Paragraph
                    if (cap = /^([^\n]+(?:\n(?!#{1,6} |[-*_]{3,}|```|\|)[^\n]+)*)/.exec(src)) {
                        src = src.substring(cap[0].length);
                        tokens.push({
                            type: 'paragraph',
                            text: cap[1]
                        });
                        continue;
                    }

                    src = src.substring(1);
                }

                // Render tokens
                let html = '';
                for (const token of tokens) {
                    switch (token.type) {
                        case 'heading':
                            html += `<h${token.depth} id="${token.id}">
                                <a href="#${token.id}" class="heading-anchor">#</a>
                                ${parseInline(token.text)}
                            </h${token.depth}>`;
                            break;
                        case 'paragraph':
                            html += `<p>${parseInline(token.text)}</p>`;
                            break;
                        case 'code':
                            html += `
                                <div class="code-block-wrapper">
                                    <div class="code-block-header">
                                        <span class="code-block-lang">${token.lang}</span>
                                        <button class="copy-btn" onclick="copyCode('${token.id}')">
                                            <span>📋</span>
                                            <span>Copy</span>
                                        </button>
                                    </div>
                                    <pre><code id="${token.id}">${escape(token.text)}</code></pre>
                                </div>
                            `;
                            break;
                        case 'command':
                            html += `
                                <div class="command-block">
                                    <div class="command-header">
                                        <span class="command-prompt">$ terminal</span>
                                        <button class="copy-btn" onclick="copyCode('${token.id}')">
                                            <span>📋</span>
                                            <span>Copy</span>
                                        </button>
                                    </div>
                                    <div class="command-content" id="${token.id}">${escape(token.text)}</div>
                                </div>
                            `;
                            break;
                        case 'blockquote':
                            html += `<blockquote>${parse(token.text)}</blockquote>`;
                            break;
                        case 'task':
                            html += `<div style="margin-bottom: 8px;">
                                <input type="checkbox" ${token.checked ? 'checked' : ''} onclick="return false;">
                                <span style="color: var(--text-secondary);">${parseInline(token.text)}</span>
                            </div>`;
                            break;
                        case 'list':
                            const tag = token.ordered ? 'ol' : 'ul';
                            const items = token.items.map(item => `<li>${parseInline(item)}</li>`).join('');
                            html += `<${tag}>${items}</${tag}>`;
                            break;
                        case 'hr':
                            html += '<hr>';
                            break;
                        case 'table':
                            const headerRow = token.headers.map(h => `<th>${parseInline(h)}</th>`).join('');
                            const bodyRows = token.rows.map(row => 
                                '<tr>' + row.map(cell => `<td>${parseInline(cell)}</td>`).join('') + '</tr>'
                            ).join('');
                            html += `<table><thead><tr>${headerRow}</tr></thead><tbody>${bodyRows}</tbody></table>`;
                            break;
                    }
                }

                return html;
            }

            return { parse };
        })();

        // Copy to clipboard function
        function copyCode(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = element.closest('.code-block-wrapper, .command-block').querySelector('.copy-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<span>✓</span><span>Copied!</span>';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('copied');
                }, 2000);
                
                Toast.show('Code copied to clipboard!', 'success');
            }).catch(err => {
                Toast.show('Failed to copy code', 'error');
            });
        }

        // ===== FILE SYSTEM MANAGER =====
        class FileSystemManager {
            constructor() {
                this.files = [];
                this.fileContents = new Map();
                this.currentFile = null;
                this.searchMode = 'filename'; // 'filename' or 'content'
                this.loadFromStorage(); // Load saved files on init
            }

            // Save to localStorage
            saveToStorage() {
                try {
                    const data = {
                        files: this.files,
                        contents: Array.from(this.fileContents.entries()),
                        currentFile: this.currentFile,
                        timestamp: Date.now()
                    };
                    localStorage.setItem('markdown-viewer-data', JSON.stringify(data));
                    console.log('Data saved to localStorage');
                } catch (error) {
                    console.error('Error saving to localStorage:', error);
                    Toast.show('Warning: Could not save files to storage', 'error');
                }
            }

            // Load from localStorage
            loadFromStorage() {
                try {
                    const saved = localStorage.getItem('markdown-viewer-data');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.files = data.files || [];
                        this.fileContents = new Map(data.contents || []);
                        this.currentFile = data.currentFile || null;
                        console.log(`Loaded ${this.files.length} files from storage`);
                        return true;
                    }
                } catch (error) {
                    console.error('Error loading from localStorage:', error);
                }
                return false;
            }

            // Clear storage
            clearStorage() {
                try {
                    localStorage.removeItem('markdown-viewer-data');
                    console.log('Storage cleared');
                } catch (error) {
                    console.error('Error clearing storage:', error);
                }
            }

            addFile(file, content, folder = 'Root') {
                // Extract folder from file path if it exists
                let finalFolder = folder;
                if (file.relativePath) {
                    const pathParts = file.relativePath.split('/');
                    if (pathParts.length > 1) {
                        // Use the directory path as folder name
                        finalFolder = pathParts.slice(0, -1).join('/');
                    }
                }
                
                const fileObj = {
                    name: file.name,
                    path: file.relativePath || file.name,
                    folder: finalFolder,
                    content: content,
                    size: file.size,
                    lastModified: file.lastModified
                };
                
                this.files.push(fileObj);
                this.fileContents.set(fileObj.path, content);
                this.saveToStorage(); // Auto-save
                return fileObj;
            }

            removeAllFiles() {
                this.files = [];
                this.fileContents.clear();
                this.currentFile = null;
                this.clearStorage(); // Clear storage too
            }

            getFileContent(filePath) {
                return this.fileContents.get(filePath);
            }

            getFilesByFolder() {
                const grouped = {};
                this.files.forEach(file => {
                    const folder = file.folder || 'Root';
                    if (!grouped[folder]) {
                        grouped[folder] = [];
                    }
                    grouped[folder].push(file);
                });
                return grouped;
            }

            normalizeSearchText(text) {
                return (text || '')
                    .toLowerCase()
                    .normalize('NFKD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[`*_>#~|\\[\]()!-]/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            tokenizeSearchQuery(query) {
                const normalized = this.normalizeSearchText(query);
                if (!normalized) return [];
                return normalized.split(' ').filter(Boolean);
            }

            stripMarkdown(content) {
                return (content || '')
                    .replace(/```+/g, ' ')
                    .replace(/`/g, ' ')
                    .replace(/!\[[^\]]*\]\([^)]+\)/g, ' ')
                    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                    .replace(/^#{1,6}\s+/gm, '')
                    .replace(/^\s*[-*+]\s+/gm, '')
                    .replace(/^\s*\d+\.\s+/gm, '')
                    .replace(/^\s*>\s?/gm, '')
                    .replace(/\|/g, ' ')
                    .replace(/\r?\n/g, ' ');
            }

            scoreTextMatch(text, tokens, normalizedText = null) {
                const normalized = normalizedText || this.normalizeSearchText(text);
                if (!normalized) return { matched: false, score: 0, index: -1 };

                let score = 0;
                let firstIndex = Infinity;

                for (const token of tokens) {
                    const tokenIndex = normalized.indexOf(token);
                    if (tokenIndex === -1) {
                        return { matched: false, score: 0, index: -1 };
                    }

                    firstIndex = Math.min(firstIndex, tokenIndex);
                    score += tokenIndex === 0 ? 30 : 14;
                    score += Math.max(0, 12 - Math.min(tokenIndex, 12));
                }

                const joinedQuery = tokens.join(' ');
                const phraseIndex = normalized.indexOf(joinedQuery);
                if (phraseIndex !== -1) {
                    score += 28;
                    firstIndex = Math.min(firstIndex, phraseIndex);
                }

                if (normalized === joinedQuery) {
                    score += 36;
                }

                return {
                    matched: true,
                    score,
                    index: Number.isFinite(firstIndex) ? firstIndex : -1
                };
            }

            escapeRegExp(value) {
                return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            buildContentSnippet(content, tokens) {
                const plainText = this.stripMarkdown(content).replace(/\s+/g, ' ').trim();
                if (!plainText) return '';

                const normalizedPlainText = this.normalizeSearchText(plainText);
                let matchIndex = -1;
                let matchLength = 0;

                const phrase = tokens.join(' ');
                if (phrase) {
                    matchIndex = normalizedPlainText.indexOf(phrase);
                    matchLength = phrase.length;
                }

                if (matchIndex === -1) {
                    for (const token of tokens) {
                        const tokenIndex = normalizedPlainText.indexOf(token);
                        if (tokenIndex !== -1) {
                            matchIndex = tokenIndex;
                            matchLength = token.length;
                            break;
                        }
                    }
                }

                if (matchIndex === -1) {
                    return plainText.slice(0, 140);
                }

                const start = Math.max(0, matchIndex - 42);
                const end = Math.min(plainText.length, matchIndex + Math.max(matchLength, 20) + 78);
                const prefix = start > 0 ? '... ' : '';
                const suffix = end < plainText.length ? ' ...' : '';
                return `${prefix}${plainText.slice(start, end).trim()}${suffix}`;
            }

            search(query) {
                if (!query) return this.files;

                const tokens = this.tokenizeSearchQuery(query);
                if (tokens.length === 0) return this.files;

                const rankedResults = this.files.map(file => {
                    const content = this.fileContents.get(file.path) || '';
                    const normalizedName = this.normalizeSearchText(file.name);
                    const normalizedPath = this.normalizeSearchText(file.path);
                    const plainTextContent = this.stripMarkdown(content);
                    const normalizedContent = this.normalizeSearchText(plainTextContent);
                    const combinedNormalized = `${normalizedName} ${normalizedPath} ${normalizedContent}`.trim();

                    const nameMatch = this.scoreTextMatch(file.name, tokens, normalizedName);
                    const pathMatch = this.scoreTextMatch(file.path, tokens, normalizedPath);
                    const contentMatch = this.scoreTextMatch(plainTextContent, tokens, normalizedContent);
                    const combinedMatch = this.scoreTextMatch('', tokens, combinedNormalized);

                    if (!combinedMatch.matched) {
                        return null;
                    }

                    let score = 0;
                    let matchType = contentMatch.matched ? 'content' : 'path';

                    if (nameMatch.matched) {
                        score += nameMatch.score + 160;
                        matchType = 'name';
                    }

                    if (pathMatch.matched) {
                        score += pathMatch.score + 100;
                        if (!nameMatch.matched) {
                            matchType = 'path';
                        }
                    }

                    if (contentMatch.matched) {
                        score += contentMatch.score + 56;
                    }

                    score += combinedMatch.score;

                    return {
                        ...file,
                        searchMeta: {
                            score,
                            matchType,
                            snippet: contentMatch.matched ? this.buildContentSnippet(content, tokens) : '',
                            matchedInContent: contentMatch.matched
                        }
                    };
                }).filter(Boolean);

                rankedResults.sort((a, b) => {
                    if (b.searchMeta.score !== a.searchMeta.score) {
                        return b.searchMeta.score - a.searchMeta.score;
                    }

                    return a.name.localeCompare(b.name);
                });

                return rankedResults;
            }
        }

        // ===== UI MANAGER =====
        class UIManager {
            constructor(fsManager) {
                this.fsManager = fsManager;
                this.elements = {
                    sidebar: document.getElementById('sidebar'),
                    menuToggle: document.getElementById('menuToggle'),
                    fileInput: document.getElementById('fileInput'),
                    searchInput: document.getElementById('searchInput'),
                    clearSearch: document.getElementById('clearSearch'),
                    fileTree: document.getElementById('fileTree'),
                    breadcrumb: document.getElementById('breadcrumb'),
                    markdownContent: document.getElementById('markdownContent'),
                    contentMain: document.getElementById('contentMain'),
                    scrollTop: document.getElementById('scrollTop'),
                    progressBar: document.getElementById('progressBar'),
                    tocSidebar: document.getElementById('tocSidebar'),
                    tocList: document.getElementById('tocList'),
                    tocToggle: document.getElementById('tocToggle'),
                    themeToggle: document.getElementById('themeToggle'),
                    themeToggleIcon: document.getElementById('themeToggleIcon'),
                    themeToggleLabel: document.getElementById('themeToggleLabel'),
                    expandAll: document.getElementById('expandAll'),
                    collapseAll: document.getElementById('collapseAll'),
                    clearAll: document.getElementById('clearAll')
                };

                this.currentActiveElement = null;
                this.currentSearchQuery = '';
                this.themeStorageKey = 'markdown-viewer-theme';
                this.initializeTheme();
                this.setupEventListeners();
            }

            initializeTheme() {
                let theme = 'light';

                try {
                    const savedTheme = localStorage.getItem(this.themeStorageKey);
                    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    theme = savedTheme || (prefersDark ? 'dark' : 'light');
                } catch (error) {
                    theme = 'light';
                }

                this.setTheme(theme, false);
            }

            setTheme(theme, persist = true) {
                document.documentElement.setAttribute('data-theme', theme);

                if (persist) {
                    try {
                        localStorage.setItem(this.themeStorageKey, theme);
                    } catch (error) {
                        console.error('Error saving theme:', error);
                    }
                }

                if (this.elements.themeToggleIcon) {
                    this.elements.themeToggleIcon.textContent = theme === 'dark' ? '☀' : '☾';
                }

                if (this.elements.themeToggleLabel) {
                    this.elements.themeToggleLabel.textContent = theme === 'dark' ? 'Light' : 'Dark';
                }

                if (this.elements.themeToggle) {
                    const nextMode = theme === 'dark' ? 'light' : 'dark';
                    this.elements.themeToggle.title = `Switch to ${nextMode} mode`;
                    this.elements.themeToggle.setAttribute('aria-label', `Switch to ${nextMode} mode`);
                }
            }

            toggleTheme() {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                this.setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            }

            setupEventListeners() {
                // Menu toggle
                this.elements.menuToggle.addEventListener('click', () => {
                    this.elements.sidebar.classList.toggle('collapsed');
                });

                // Files selection button
                document.getElementById('selectFiles').addEventListener('click', () => {
                    this.elements.fileInput.click();
                });

                // Folder selection button - prefer a batch-friendly directory input
                document.getElementById('selectFolder').addEventListener('click', async () => {
                    try {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.multiple = true;
                        input.webkitdirectory = true;
                        input.directory = true;
                        input.accept = '.md,.markdown';
                        
                        input.onchange = async (e) => {
                            const files = Array.from(e.target.files || []);
                            const processedFiles = files.map(file => {
                                const relativePath = file.webkitRelativePath || file.relativePath || file.name;
                                this.attachRelativePath(file, relativePath);
                                return file;
                            });
                            
                            await this.handleFileInput(processedFiles);
                        };
                        
                        input.click();
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.error('Folder selection error:', err);
                            Toast.show('Choose a parent folder to import everything in one pass', 'info');
                        }
                    }
                });

                // Upload area click - default to files
                document.addEventListener('click', (e) => {
                    // Clicking anywhere in sidebar to upload is removed - only use buttons
                });

                // File input changes
                this.elements.fileInput.addEventListener('change', async (e) => {
                    await this.handleFileInput(e.target.files);
                    e.target.value = ''; // Reset input
                });

                // Drag and drop - on entire sidebar
                const dropZone = this.elements.sidebar;

                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropZone.addEventListener(eventName, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                    });
                });

                // Also prevent default on document to allow drops
                ['dragenter', 'dragover'].forEach(eventName => {
                    document.addEventListener(eventName, (e) => {
                        e.preventDefault();
                    });
                });

                dropZone.addEventListener('dragenter', (e) => {
                    dropZone.classList.add('drag-active');
                });

                dropZone.addEventListener('dragleave', (e) => {
                    if (e.target === dropZone) {
                        dropZone.classList.remove('drag-active');
                    }
                });

                dropZone.addEventListener('drop', async (e) => {
                    dropZone.classList.remove('drag-active');
                    
                    const items = e.dataTransfer.items;
                    const files = [];
                    
                    if (items) {
                        // Use DataTransferItemList interface to access files/folders
                        const promises = [];
                        for (let i = 0; i < items.length; i++) {
                            const item = items[i].webkitGetAsEntry();
                            if (item) {
                                promises.push(this.traverseFileTree(item, ''));
                            }
                        }
                        
                        const results = await Promise.all(promises);
                        results.forEach(result => files.push(...result));
                    } else {
                        // Fallback for browsers that don't support DataTransferItemList
                        const droppedFiles = Array.from(e.dataTransfer.files);
                        files.push(...droppedFiles.filter(f => 
                            f.name.endsWith('.md') || f.name.endsWith('.markdown')
                        ));
                    }
                    
                    if (files.length > 0) {
                        await this.handleFiles(files);
                    } else {
                        Toast.show('No markdown files found', 'error');
                    }
                });

                // Search
                this.elements.searchInput.addEventListener('input', (e) => {
                    this.handleSearch(e.target.value);
                });

                this.elements.clearSearch.addEventListener('click', () => {
                    this.elements.searchInput.value = '';
                    this.handleSearch('');
                });

                // Scroll tracking
                this.elements.contentMain.addEventListener('scroll', () => {
                    this.handleScroll();
                });

                // Scroll to top
                this.elements.scrollTop.addEventListener('click', () => {
                    this.elements.contentMain.scrollTo({ top: 0, behavior: 'smooth' });
                });

                // TOC toggle
                this.elements.tocToggle.addEventListener('click', () => {
                    this.elements.tocSidebar.classList.toggle('visible');
                });

                this.elements.themeToggle.addEventListener('click', () => {
                    this.toggleTheme();
                });

                // Expand/Collapse all
                this.elements.expandAll.addEventListener('click', () => {
                    document.querySelectorAll('.folder').forEach(folder => {
                        folder.classList.remove('collapsed');
                    });
                });

                this.elements.collapseAll.addEventListener('click', () => {
                    document.querySelectorAll('.folder').forEach(folder => {
                        folder.classList.add('collapsed');
                    });
                });

                // Clear all
                this.elements.clearAll.addEventListener('click', () => {
                    if (confirm('Are you sure you want to remove all files?')) {
                        this.fsManager.removeAllFiles();
                        this.renderFileTree();
                        this.showEmptyState();
                        Toast.show('All files removed', 'info');
                    }
                });

                // Clear storage button
                const clearStorageBtn = document.getElementById('clearStorage');
                if (clearStorageBtn) {
                    clearStorageBtn.addEventListener('click', () => {
                        if (confirm('Clear all stored files? This will remove all saved data.')) {
                            this.fsManager.removeAllFiles();
                            this.renderFileTree();
                            this.showEmptyState();
                            this.updateFileCountBadge();
                            Toast.show('Storage cleared', 'info');
                        }
                    });
                }

                // Window resize
                window.addEventListener('resize', () => {
                    if (window.innerWidth > 768) {
                        this.elements.sidebar.classList.remove('collapsed');
                    }
                });
            }

            async handleFileInput(fileList) {
                const files = Array.from(fileList).filter(f => 
                    f.name.endsWith('.md') || f.name.endsWith('.markdown')
                );
                
                if (files.length === 0) {
                    Toast.show('No markdown files found', 'error');
                    return;
                }

                await this.handleFiles(files);
            }

            attachRelativePath(file, relativePath) {
                if (!relativePath || !file) return file;

                try {
                    if (!Object.prototype.hasOwnProperty.call(file, 'relativePath')) {
                        Object.defineProperty(file, 'relativePath', {
                            value: relativePath,
                            writable: false
                        });
                    }
                } catch (error) {
                    file.relativePath = relativePath;
                }

                return file;
            }

            // Read directory using File System Access API
            async readDirectoryRecursive(dirHandle, path = '') {
                const files = [];
                
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file') {
                        if (entry.name.endsWith('.md') || entry.name.endsWith('.markdown')) {
                            const file = await entry.getFile();
                            files.push(this.attachRelativePath(file, path + file.name));
                        }
                    } else if (entry.kind === 'directory') {
                        const subFiles = await this.readDirectoryRecursive(entry, path + entry.name + '/');
                        files.push(...subFiles);
                    }
                }
                
                return files;
            }

            async readAllDirectoryEntries(dirReader) {
                const entries = [];

                while (true) {
                    const batch = await new Promise((resolve, reject) => {
                        dirReader.readEntries(resolve, reject);
                    });

                    if (!batch || batch.length === 0) {
                        break;
                    }

                    entries.push(...batch);
                }

                return entries;
            }

            // Traverse file tree for drag and drop folders
            async traverseFileTree(item, path) {
                const files = [];
                
                if (item.isFile) {
                    const file = await new Promise((resolve) => {
                        item.file(resolve);
                    });
                    
                    if (file.name.endsWith('.md') || file.name.endsWith('.markdown')) {
                        files.push(this.attachRelativePath(file, path + file.name));
                    }
                } else if (item.isDirectory) {
                    const dirReader = item.createReader();
                    const entries = await this.readAllDirectoryEntries(dirReader);
                    
                    for (const entry of entries) {
                        const subFiles = await this.traverseFileTree(entry, path + item.name + '/');
                        files.push(...subFiles);
                    }
                }
                
                return files;
            }

            async handleFiles(files) {
                if (files.length === 0) return;

                const uniqueFiles = [];
                const seenPaths = new Set();

                files.forEach(file => {
                    const key = file.relativePath || file.webkitRelativePath || file.name;
                    if (seenPaths.has(key)) return;
                    seenPaths.add(key);
                    uniqueFiles.push(file);
                });

                // Show loading toast
                const loadingToast = document.createElement('div');
                loadingToast.className = 'toast info';
                loadingToast.innerHTML = `
                    <div class="spinner" style="width: 20px; height: 20px; border-width: 2px; margin: 0;"></div>
                    <span>Loading ${uniqueFiles.length} file(s)...</span>
                `;
                document.getElementById('toastContainer').appendChild(loadingToast);

                let successCount = 0;
                let errorCount = 0;

                for (const file of uniqueFiles) {
                    try {
                        const content = await this.readFile(file);
                        this.fsManager.addFile(file, content);
                        successCount++;
                    } catch (error) {
                        console.error(`Error loading ${file.name}:`, error);
                        errorCount++;
                    }
                }

                // Remove loading toast
                loadingToast.remove();

                this.renderFileTree();
                Toast.show(`Successfully loaded ${successCount} file(s)${errorCount > 0 ? ` (${errorCount} failed)` : ''}`, successCount === uniqueFiles.length ? 'success' : 'info');
                this.updateFileCountBadge();

                // Auto-load first file if none selected
                if (!this.fsManager.currentFile && this.fsManager.files.length > 0) {
                    const firstFile = this.fsManager.files[0];
                    const firstElement = document.querySelector('.file-item');
                    if (firstElement) {
                        setTimeout(() => {
                            this.loadAndDisplayFile(firstFile, firstElement);
                        }, 300);
                    }
                }
            }

            readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            updateFileCountBadge() {
                const badge = document.getElementById('fileCountBadge');
                const clearBtn = document.getElementById('clearStorage');
                
                if (this.fsManager.files.length > 0) {
                    badge.textContent = this.fsManager.files.length;
                    badge.style.display = 'inline-block';
                    clearBtn.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                    clearBtn.style.display = 'none';
                }
            }

            renderFileTree(filterQuery = '') {
                const files = filterQuery ? 
                    this.fsManager.search(filterQuery) : 
                    this.fsManager.files;

                const grouped = {};
                files.forEach(file => {
                    const folder = file.folder || 'Root';
                    if (!grouped[folder]) grouped[folder] = [];
                    grouped[folder].push(file);
                });

                this.elements.fileTree.innerHTML = '';

                if (Object.keys(grouped).length === 0) {
                    this.elements.fileTree.innerHTML = `
                        <div class="no-files">
                            <div style="font-size: 48px; margin-bottom: 12px;">
                                ${filterQuery ? '🔍' : '📂'}
                            </div>
                            <div style="font-weight: 600; margin-bottom: 8px;">
                                ${filterQuery ? 'Nothing matched' : 'Shelf is quiet'}
                            </div>
                            <div style="font-size: 13px;">
                                ${filterQuery ? 'Try a softer keyword or search by a different file name.' : 'Open markdown files to fill this room with notes, chapters, and references.'}
                            </div>
                        </div>
                    `;
                    return;
                }

                Object.keys(grouped).sort().forEach(folderName => {
                    const files = grouped[folderName];
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder';

                    const folderHeader = document.createElement('div');
                    folderHeader.className = 'folder-header';
                    folderHeader.innerHTML = `
                        <span class="folder-icon">▼</span>
                        <span class="folder-name">📁 ${folderName}</span>
                        <span class="folder-count">${files.length}</span>
                    `;
                    folderHeader.onclick = () => {
                        folderDiv.classList.toggle('collapsed');
                    };

                    const folderContent = document.createElement('div');
                    folderContent.className = 'folder-content';

                    (filterQuery ? files : [...files].sort((a, b) => a.name.localeCompare(b.name))).forEach(file => {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'file-item';
                        if (this.fsManager.currentFile === file.path) {
                            fileItem.classList.add('active');
                            this.currentActiveElement = fileItem;
                        }
                        const snippet = file.searchMeta && file.searchMeta.snippet
                            ? `<div class="file-snippet">${this.highlightSearch(file.searchMeta.snippet, filterQuery)}</div>`
                            : '';
                        fileItem.innerHTML = `
                            <span class="file-icon">📄</span>
                            <div class="file-text">
                                <span class="file-name">${this.highlightSearch(file.name, filterQuery)}</span>
                                ${snippet}
                            </div>
                        `;
                        fileItem.onclick = () => this.loadAndDisplayFile(file, fileItem);
                        folderContent.appendChild(fileItem);
                    });

                    folderDiv.appendChild(folderHeader);
                    folderDiv.appendChild(folderContent);
                    this.elements.fileTree.appendChild(folderDiv);
                });
            }

            highlightSearch(text, query) {
                if (!query) return text;
                const tokens = query
                    .split(/\s+/)
                    .map(token => token.trim())
                    .filter(Boolean)
                    .sort((a, b) => b.length - a.length);

                if (tokens.length === 0) return text;

                const escapedTokens = tokens.map(token =>
                    token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
                );
                const regex = new RegExp(`(${escapedTokens.join('|')})`, 'gi');
                return text.replace(regex, '<span class="search-highlight">$1</span>');
            }

            clearDocumentSearchMarkers() {
                this.elements.markdownContent.querySelectorAll('.search-jump-target').forEach(marker => {
                    const textNode = document.createTextNode(marker.textContent);
                    marker.replaceWith(textNode);
                });
            }

            findMatchInTextNode(text, query) {
                if (!text || !query) return null;

                const loweredText = text.toLowerCase();
                const trimmedQuery = query.trim().toLowerCase();
                if (trimmedQuery) {
                    const phraseIndex = loweredText.indexOf(trimmedQuery);
                    if (phraseIndex !== -1) {
                        return { index: phraseIndex, length: trimmedQuery.length };
                    }
                }

                const tokens = query
                    .toLowerCase()
                    .split(/\s+/)
                    .map(token => token.trim())
                    .filter(Boolean)
                    .sort((a, b) => b.length - a.length);

                for (const token of tokens) {
                    const tokenIndex = loweredText.indexOf(token);
                    if (tokenIndex !== -1) {
                        return { index: tokenIndex, length: token.length };
                    }
                }

                return null;
            }

            revealSearchMatch(query) {
                if (!query) return;

                this.clearDocumentSearchMarkers();

                const walker = document.createTreeWalker(
                    this.elements.markdownContent,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode: node => {
                            if (!node.nodeValue || !node.nodeValue.trim()) {
                                return NodeFilter.FILTER_REJECT;
                            }

                            const parentElement = node.parentElement;
                            if (!parentElement) {
                                return NodeFilter.FILTER_REJECT;
                            }

                            if (parentElement.closest('.heading-anchor, .copy-btn, .toc-sidebar')) {
                                return NodeFilter.FILTER_REJECT;
                            }

                            return NodeFilter.FILTER_ACCEPT;
                        }
                    }
                );

                let textNode;
                while ((textNode = walker.nextNode())) {
                    const match = this.findMatchInTextNode(textNode.nodeValue, query);
                    if (!match) continue;

                    const range = document.createRange();
                    range.setStart(textNode, match.index);
                    range.setEnd(textNode, match.index + match.length);

                    const marker = document.createElement('span');
                    marker.className = 'search-jump-target';
                    range.surroundContents(marker);

                    marker.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return true;
                }

                return false;
            }

            loadAndDisplayFile(file, element) {
                try {
                    // Update active state
                    if (this.currentActiveElement) {
                        this.currentActiveElement.classList.remove('active');
                    }
                    element.classList.add('active');
                    this.currentActiveElement = element;

                    // Get content
                    const content = this.fsManager.getFileContent(file.path);
                    
                    if (!content) {
                        throw new Error('File content not found');
                    }

                    // Parse markdown
                    const html = MarkdownParser.parse(content);

                    // Update UI
                    this.elements.markdownContent.innerHTML = html;
                    this.fsManager.currentFile = file.path;
                    this.fsManager.saveToStorage(); // Save current file selection

                    // Update breadcrumb
                    this.updateBreadcrumb(file);

                    // Generate TOC
                    this.generateTOC();

                    // Scroll to top
                    this.elements.contentMain.scrollTop = 0;

                    if (this.currentSearchQuery && file.searchMeta && file.searchMeta.matchedInContent) {
                        requestAnimationFrame(() => {
                            this.revealSearchMatch(this.currentSearchQuery);
                        });
                    }

                    // Close sidebar on mobile
                    if (window.innerWidth <= 768) {
                        this.elements.sidebar.classList.add('collapsed');
                    }
                } catch (error) {
                    Toast.show(`Error displaying file: ${error.message}`, 'error');
                    this.showEmptyState();
                }
            }

            showEmptyState() {
                this.elements.markdownContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <h2 class="empty-title">Settle in and start reading</h2>
                        <p class="empty-text">Open a markdown file from the shelf and this page will become your late-night reading space.</p>
                    </div>
                `;
            }

            updateBreadcrumb(file) {
                const parts = file.path.split('/');
                let breadcrumbHTML = '<span>🏠</span>';
                
                parts.forEach((part, index) => {
                    if (index > 0) {
                        breadcrumbHTML += '<span class="breadcrumb-separator">/</span>';
                    }
                    breadcrumbHTML += `<span class="breadcrumb-item">${part}</span>`;
                });

                this.elements.breadcrumb.innerHTML = breadcrumbHTML;
            }

            generateTOC() {
                const headings = this.elements.markdownContent.querySelectorAll('h2, h3, h4');
                
                if (headings.length === 0) {
                    return;
                }

                this.elements.tocList.innerHTML = '';
                
                headings.forEach(heading => {
                    const level = heading.tagName.toLowerCase();
                    const text = heading.textContent.replace('#', '').trim();
                    const id = heading.id;

                    const li = document.createElement('li');
                    li.className = `toc-item toc-item-${level}`;

                    const a = document.createElement('a');
                    a.className = 'toc-link';
                    a.href = `#${id}`;
                    a.textContent = text;
                    a.onclick = (e) => {
                        e.preventDefault();
                        heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        
                        document.querySelectorAll('.toc-link').forEach(link => {
                            link.classList.remove('active');
                        });
                        a.classList.add('active');
                    };

                    li.appendChild(a);
                    this.elements.tocList.appendChild(li);
                });
            }

            handleSearch(query) {
                this.currentSearchQuery = query.trim();
                if (!this.currentSearchQuery) {
                    this.clearDocumentSearchMarkers();
                }
                this.renderFileTree(query);
            }

            handleScroll() {
                const scrollTop = this.elements.contentMain.scrollTop;
                const scrollHeight = this.elements.contentMain.scrollHeight - this.elements.contentMain.clientHeight;
                const progress = (scrollTop / scrollHeight) * 100;

                this.elements.progressBar.style.width = `${progress}%`;

                // Show/hide scroll to top
                if (scrollTop > 300) {
                    this.elements.scrollTop.classList.add('visible');
                } else {
                    this.elements.scrollTop.classList.remove('visible');
                }

                // Update active TOC
                this.updateActiveTOC();
            }

            updateActiveTOC() {
                const headings = this.elements.markdownContent.querySelectorAll('h2, h3, h4');
                let activeHeading = null;
                
                headings.forEach(heading => {
                    const rect = heading.getBoundingClientRect();
                    if (rect.top <= 120) {
                        activeHeading = heading;
                    }
                });

                if (activeHeading) {
                    document.querySelectorAll('.toc-link').forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === `#${activeHeading.id}`) {
                            link.classList.add('active');
                        }
                    });
                }
            }

        }

        // ===== INITIALIZE APP =====
        const fsManager = new FileSystemManager();
        const uiManager = new UIManager(fsManager);

        // Initialize - restore saved files if any
        if (fsManager.files.length > 0) {
            Toast.show(`Restored ${fsManager.files.length} file(s) from last session`, 'success');
            uiManager.renderFileTree();
            uiManager.updateFileCountBadge();
            
            // Try to restore the last opened file
            if (fsManager.currentFile) {
                const file = fsManager.files.find(f => f.path === fsManager.currentFile);
                if (file) {
                    setTimeout(() => {
                        const fileElement = Array.from(document.querySelectorAll('.file-item'))
                            .find(el => el.querySelector('.file-name').textContent === file.name);
                        if (fileElement) {
                            uiManager.loadAndDisplayFile(file, fileElement);
                        }
                    }, 100);
                }
            }
        } else {
            Toast.show('Drop files on sidebar or click 📄/📂 to upload', 'info');
        }
    </script>
</body>
</html>
