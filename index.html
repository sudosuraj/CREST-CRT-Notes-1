<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late-Night Reading Room</title>
    <script>
        (() => {
            try {
                const savedTheme = localStorage.getItem('markdown-viewer-theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', savedTheme || (prefersDark ? 'dark' : 'light'));
            } catch (error) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #dbeafe;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-code: #1e293b;
            --bg-code-light: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --text-code: #e2e8f0;
            --border: #e2e8f0;
            --border-dark: #cbd5e1;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius: 8px;
            --radius-lg: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-secondary);
            overflow: hidden;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--bg-primary);
            padding: 16px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--success);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Main Layout */
        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search Section */
        .search-section {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 8px 36px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            background: var(--bg-secondary);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: var(--bg-primary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .clear-search {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: none;
            transition: all 0.2s;
        }

        .clear-search:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .search-input:not(:placeholder-shown) ~ .clear-search {
            display: block;
        }

        /* File Tree */
        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .file-tree::-webkit-scrollbar {
            width: 8px;
        }

        .file-tree::-webkit-scrollbar-track {
            background: transparent;
        }

        .file-tree::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .file-tree::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        .folder {
            margin-bottom: 2px;
        }

        .folder-header {
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            user-select: none;
            transition: all 0.15s;
            border-radius: 4px;
            margin: 0 4px;
        }

        .folder-header:hover {
            background: var(--bg-tertiary);
        }

        .folder-icon {
            font-size: 14px;
            transition: transform 0.2s;
            color: var(--primary);
        }

        .folder.collapsed .folder-icon {
            transform: rotate(-90deg);
        }

        .folder-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-count {
            font-size: 10px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 500;
        }

        .folder-content {
            padding-left: 12px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .folder.collapsed .folder-content {
            max-height: 0;
        }

        .file-item {
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s;
            border-left: 2px solid transparent;
            border-radius: 4px;
            margin: 1px 4px;
            position: relative;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(2px);
        }

        .file-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            border-left-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .file-icon {
            font-size: 14px;
        }

        .file-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-text {
            flex: 1;
            min-width: 0;
        }

        .file-snippet {
            margin-top: 2px;
            font-size: 11px;
            line-height: 1.45;
            color: var(--text-tertiary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            color: var(--text-secondary);
            border-radius: var(--radius);
            transition: all 0.2s;
        }

        .menu-toggle:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .breadcrumb {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            overflow-x: auto;
            white-space: nowrap;
        }

        .breadcrumb::-webkit-scrollbar {
            height: 4px;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb-separator {
            color: var(--text-tertiary);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-icon {
            padding: 8px;
        }

        /* Content Area */
        .content-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        .content-main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .content-main::-webkit-scrollbar {
            width: 10px;
        }

        .content-main::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-main::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .content-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-primary);
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            min-height: 100%;
        }

        /* TOC Sidebar */
        .toc-sidebar {
            width: 280px;
            background: var(--bg-primary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px;
            display: none;
        }

        .toc-sidebar.visible {
            display: block;
        }

        .toc-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 8px;
        }

        .toc-link {
            display: block;
            padding: 6px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .toc-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .toc-link.active {
            color: var(--primary);
            background: var(--primary-light);
            border-left-color: var(--primary);
            font-weight: 500;
        }

        .toc-item-h3 {
            padding-left: 16px;
        }

        .toc-item-h4 {
            padding-left: 32px;
        }

        /* Markdown Content */
        .markdown-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            scroll-margin-top: 100px;
            position: relative;
        }

        .markdown-content h1 {
            font-size: 42px;
            border-bottom: 3px solid var(--border);
            padding-bottom: 16px;
            margin-top: 0;
        }

        .markdown-content h2 {
            font-size: 32px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
        }

        .markdown-content h3 {
            font-size: 26px;
        }

        .markdown-content h4 {
            font-size: 22px;
        }

        .markdown-content h5 {
            font-size: 18px;
        }

        .markdown-content h6 {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Heading Anchor Links */
        .heading-anchor {
            position: absolute;
            left: -30px;
            opacity: 0;
            font-size: 20px;
            color: var(--text-tertiary);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .markdown-content h1:hover .heading-anchor,
        .markdown-content h2:hover .heading-anchor,
        .markdown-content h3:hover .heading-anchor,
        .markdown-content h4:hover .heading-anchor {
            opacity: 1;
        }

        .markdown-content p {
            margin-bottom: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .markdown-content a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
            font-weight: 500;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--primary);
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 16px;
            padding-left: 32px;
        }

        .markdown-content li {
            margin-bottom: 8px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .markdown-content ul li {
            list-style-type: disc;
        }

        .markdown-content ol li {
            list-style-type: decimal;
        }

        /* Inline Code */
        .markdown-content code {
            background: var(--bg-code-light);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
            color: #e11d48;
            border: 1px solid var(--border);
            font-weight: 500;
        }

        /* Code Blocks */
        .code-block-wrapper {
            position: relative;
            margin: 20px 0;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .code-block-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #475569;
        }

        .code-block-lang {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
        }

        .copy-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: #475569;
            border-color: #64748b;
            transform: translateY(-1px);
        }

        .copy-btn.copied {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .markdown-content pre {
            background: var(--bg-code);
            padding: 20px;
            margin: 0;
            overflow-x: auto;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: var(--text-code);
            font-size: 14px;
            border: none;
            line-height: 1.6;
            display: block;
            white-space: pre;
            tab-size: 4;
        }

        /* Command Blocks */
        .command-block {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: var(--radius);
            margin: 20px 0;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .command-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }

        .command-prompt {
            color: #10b981;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .command-content {
            padding: 16px;
            color: #e2e8f0;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
            tab-size: 4;
        }

        /* Blockquotes */
        .markdown-content blockquote {
            border-left: 4px solid var(--primary);
            padding: 16px 20px;
            margin: 20px 0;
            background: var(--bg-tertiary);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--text-secondary);
            position: relative;
        }

        .markdown-content blockquote::before {
            content: '"';
            font-size: 60px;
            color: var(--primary);
            opacity: 0.2;
            position: absolute;
            top: -10px;
            left: 10px;
            font-family: Georgia, serif;
        }

        .markdown-content blockquote p {
            margin: 0;
        }

        /* Tables */
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 14px;
            box-shadow: var(--shadow-md);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .markdown-content thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .markdown-content th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            border: none;
        }

        .markdown-content td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .markdown-content tbody tr {
            background: var(--bg-primary);
            transition: background 0.2s;
        }

        .markdown-content tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .markdown-content tbody tr:last-child td {
            border-bottom: none;
        }

        /* Images */
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 24px 0;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .markdown-content img:hover {
            transform: scale(1.02);
        }

        /* Horizontal Rule */
        .markdown-content hr {
            border: none;
            border-top: 2px solid var(--border);
            margin: 40px 0;
        }

        /* Task Lists */
        .markdown-content input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* Badges/Pills */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: var(--primary);
            color: white;
            margin: 0 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Search Highlights */
        .search-highlight {
            background: #fef08a;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }

        /* Scroll to Top */
        .scroll-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 52px;
            height: 52px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s;
            z-index: 99;
        }

        .scroll-top:hover {
            background: var(--primary-dark);
            transform: translateY(-4px);
        }

        .scroll-top.visible {
            display: flex;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            width: 0%;
            transition: width 0.2s;
            z-index: 9999;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .toc-sidebar {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 1000;
            }

            .content-main {
